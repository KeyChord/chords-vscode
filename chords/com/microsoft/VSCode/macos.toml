], shortcut = "cmd+k cmd+backslash" }
sr = { name = "Split: Right", 'emit:command' = [
  'workbench.action.splitEditorRight',
], shortcut = "cmd+k cmd+backslash" }
su = { name = "Split Up", 'emit:command' = [
