name = "VSCode"

[on.command]
file = 'vscode.js'
args = ["/Applications/Visual Studio Code.app"]

[chords]
'?f' = { name = "Find / File" }

# Find
'f[' = [
  { name = "Find Previous", 'emit:command' = [
    'workbench.action.browser.findPrevious',
  ], shortcut = "shift+cmd+g" },
  { name = "workbench.action.terminal.findPrevious", 'emit:command' = [
    'workbench.action.terminal.findPrevious',
  ], shortcut = "shift+f3" },
]
'f]' = [
  { name = "Find Next", 'emit:command' = [
    'workbench.action.browser.findNext',
  ], shortcut = "cmd+g" },
  { name = "workbench.action.terminal.findNext", 'emit:command' = [
    'workbench.action.terminal.findNext',
  ], shortcut = "f3" },
]
fr = { name = "Find and Replace", 'emit:command' = [
  'editor.action.startFindReplaceAction',
], shortcut = "alt+cmd+f" }
fg = { name = "Find Globally", 'emit:command' = [
  'workbench.action.findInFiles',
], shortcut = "shift+cmd+f" }
frg = { name = "Find Replace Globally", 'emit:command' = [
  'workbench.action.replaceInFiles',
], shortcut = "shift+cmd+h" }

# File
fpa = { name = "File Path: Absolute (copy to clipboard)", 'emit:command' = ['copyFilePath'] }
fpr = { name = "File: Path: Relative (copy to clipboard)", 'emit:command' = [
  'workbench.action.files.copyPathOfActiveFile',
] }
frp = { name = "File: Relative Path", 'emit:command' = [
  'copyRelativeFilePath',
], shortcut = "shift+alt+cmd+c" }
fn = { name = "File: New", shortcut = "ctrl+opt+cmd+n" }
fnn = { name = "File: New Name", 'emit:command' = ['renameFile'] }
fh = { name = "File: Here", 'emit:command' = ['explorer.newFile'] }
fd = { name = "File: Directory", 'emit:command' = ['explorer.newFolder'] }
fc = { name = "File: Close Directory", 'emit:command' = [
  'workbench.action.closeFolder',
], shortcut = "cmd+k f" }
fnu = { name = "File: New Untitled File", 'emit:command' = [
  'workbench.action.files.newUntitledFile',
], shortcut = "cmd+n" }
ft = { name = "File: Trash", 'emit:command' = ['deleteFile'], shortcut = "alt+cmd+backspace" }
fm = { name = "File: Format", 'emit:command' = [
  'editor.action.formatDocument',
], shortcut = "shift+alt+f" }
fs = { name = "File: Show", 'emit:command' = ['revealInExplorer'] }
fra = { name = "search.action.replaceAllInFile", 'emit:command' = [
  'search.action.replaceAllInFile',
], shortcut = "shift+cmd+enter" }
fo = { name = "File: Open", 'emit:command' = [
  'workbench.action.files.openFile',
], shortcut = "cmd+o" }
for = { name = "File: Open Recent", 'emit:command' = [
  'workbench.action.openRecent',
], shortcut = "ctrl+r" }

## Fold
'?ff' = { name = "Folding: Fold" }
ff = { name = "Folding: Fold", 'emit:command' = ['editor.fold'], shortcut = "alt+cmd+[" }
ffa = { name = "Folding: Fold All", 'emit:command' = ['editor.foldAll'], shortcut = "cmd+k cmd+0" }
ffc = { name = "Folding: Fold Comments", 'emit:command' = [
  'editor.foldAllBlockComments',
], shortcut = "cmd+k cmd+/" }
ffr = { name = "Folding: Fold Recursively", 'emit:command' = [
  'editor.foldRecursively',
], shortcut = "cmd+k cmd+[" }
ffe = { name = "Folding: Fold All Except", 'emit:command' = [
  'editor.foldAllExcept',
], shortcut = "cmd+k cmd+-" }
ffm = { name = "Folding: Fold All Marker Regions", 'emit:command' = [
  'editor.foldAllMarkerRegions',
], shortcut = "cmd+k cmd+8" }

## Unfold
'?fu' = { name = "Folding: Unfold" }
fu = { name = "Folding: Unfold", 'emit:command' = ['editor.unfold'], shortcut = "alt+cmd+]" }
fua = { name = "Folding: Unfold All", 'emit:command' = [
  'editor.unfoldAll',
], shortcut = "cmd+k cmd+j" }
fuc = { name = "Folding: Unfold Comments", 'emit:command' = ['editor.unfoldAllBlockComments'] }
fur = { name = "Folding: Unfold Recursively", 'emit:command' = [
  'editor.unfoldRecursively',
], shortcut = "cmd+k cmd+]" }
fue = { name = "Folding: Unfold All Except", 'emit:command' = [
  'editor.unfoldAllExcept',
], shortcut = "cmd+k cmd+=" }
fum = { name = "Folding: Unfold All Marker Regions", 'emit:command' = [
  'editor.unfoldAllMarkerRegions',
], shortcut = "cmd+k cmd+9" }

ffs = { name = "Folding: From Selection", 'emit:command' = [
  'editor.createFoldingRangeFromSelection',
], shortcut = "cmd+k cmd+," }
frm = { name = "Folding: Remove Manual", 'emit:command' = [
  'editor.removeManualFoldingRanges',
], shortcut = "cmd+k cmd+." }
ftr = { name = "Folding: Toggle Recursively", 'emit:command' = [
  'editor.toggleFoldRecursively',
], shortcut = "cmd+k shift+cmd+l" }

'?f{1..7}' = { name = "Folding: Level" }
f1 = { name = "editor.foldLevel1", 'emit:command' = [
  'editor.foldLevel1',
], shortcut = "cmd+k cmd+1" }
f2 = { name = "editor.foldLevel2", 'emit:command' = [
  'editor.foldLevel2',
], shortcut = "cmd+k cmd+2" }
f3 = { name = "editor.foldLevel3", 'emit:command' = [
  'editor.foldLevel3',
], shortcut = "cmd+k cmd+3" }
f4 = { name = "editor.foldLevel4", 'emit:command' = [
  'editor.foldLevel4',
], shortcut = "cmd+k cmd+4" }
f5 = { name = "editor.foldLevel5", 'emit:command' = [
  'editor.foldLevel5',
], shortcut = "cmd+k cmd+5" }
f6 = { name = "editor.foldLevel6", 'emit:command' = [
  'editor.foldLevel6',
], shortcut = "cmd+k cmd+6" }
f7 = { name = "editor.foldLevel7", 'emit:command' = [
  'editor.foldLevel7',
], shortcut = "cmd+k cmd+7" }

# History
hb = { name = "History: Back", 'emit:command' = [
  'workbench.action.navigateBack',
], shortcut = "BrowserBack" }
hf = { name = "History: Forward", 'emit:command' = [
  'workbench.action.navigateForward',
], shortcut = "BrowserForward" }

# Panels
'?p' = { name = "Panel" }
pa = { name = "Panel: AI", 'emit:command' = ['workbench.panel.chat'], shortcut = "ctrl+cmd+i" }
pd = { name = "Panel: Debug", 'emit:command' = ['workbench.view.debug'], shortcut = "shift+cmd+d" }
pe = { name = "Panel: Explorer", 'emit:command' = [
  'workbench.view.explorer',
], shortcut = "shift+cmd+e" }
pg = { name = "Panel: Git", 'emit:command' = ['workbench.view.scm'], shortcut = "ctrl+shift+g" }
pmd = { name = "Panel: Move Down", 'emit:command' = [
  'views.moveViewDown',
], shortcut = "cmd+k down" }
pml = { name = "Panel: Move Left", 'emit:command' = [
  'views.moveViewLeft',
], shortcut = "cmd+k left" }
pmr = { name = "Panel: Move Right", 'emit:command' = [
  'views.moveViewRight',
], shortcut = "cmd+k right" }
pmu = { name = "Panel: Move Up", 'emit:command' = ['views.moveViewUp'], shortcut = "cmd+k up" }
pp = { name = "Panel: Problems", 'emit:command' = [
  'workbench.actions.view.problems',
], shortcut = "shift+cmd+m" }
ps = { name = "Panel: Search", 'emit:command' = [
  'workbench.view.search',
], shortcut = "shift+cmd+f" }
psb = { name = "Panel: Side Bar", 'emit:command' = [
  'workbench.action.toggleSidebarVisibility',
], shortcut = "cmd+b" }
pm = { name = "Panel: Marketplace", 'emit:command' = [
  'workbench.view.extensions',
], shortcut = "shift+cmd+x" }
po = { name = "Panel: Open", 'emit:command' = [
  'workbench.action.quickOpenView',
], shortcut = "cmd+shift+p v i e w space" }
pf = { name = "Panel: Forward", 'emit:command' = [
  'workbench.action.quickOpenNavigateNextInViewPicker',
], shortcut = "ctrl+q" }
pb = { name = "Panel: Back", 'emit:command' = [
  'workbench.action.quickOpenNavigatePreviousInViewPicker',
], shortcut = "ctrl+shift+q" }
pi = { name = "Panel: Info", 'emit:command' = ['workbench.action.togglePanel'], shortcut = "cmd+j" }
px = { name = "Panel: Next", 'emit:command' = ['workbench.action.focusNextPart'], shortcut = "f6" }
pv = { name = "Panel: Forward", 'emit:command' = [
  'workbench.action.focusPreviousPart',
], shortcut = "shift+f6" }
pgk = { name = "Page: Keybindings", 'emit:command' = [
  'workbench.action.openGlobalKeybindings',
], shortcut = "cmd+k cmd+s" }
pgs = { name = "Page: Settings", 'emit:command' = [
  'workbench.action.openSettings',
], shortcut = "cmd+," }

'?e' = { name = "Editor" }
ea = { name = "Editor: Actions", 'emit:command' = ['editor.action.quickFix'], shortcut = "cmd+." }
ek = { name = "Editor: Kwik Fix", 'emit:command' = ['editor.action.quickFix'], shortcut = "cmd+." }
es = { name = "Editor: Focus", 'emit:command' = ['workbench.action.focusActiveEditorGroup'] }
ep = { name = "Editor: Pin", 'emit:command' = [
  'workbench.action.pinEditor',
], shortcut = "cmd+k shift+enter" }
eu = { name = "Editor: Unpin", 'emit:command' = [
  'workbench.action.unpinEditor',
], shortcut = "cmd+k shift+enter" }
esa = { name = "Editor: Show All", 'emit:command' = [
  'workbench.action.showAllEditors',
], shortcut = "alt+cmd+tab" }
eo = { name = "Editor: Open Recently Closed", 'emit:command' = [
  'workbench.action.reopenClosedEditor',
], shortcut = "shift+cmd+t" }
'e[' = { name = "Editor: Previous", 'emit:command' = [
  'workbench.action.previousEditorInGroup',
], shortcut = "cmd+k alt+cmd+left" }
'e]' = { name = "Editor: Next", 'emit:command' = [
  'workbench.action.nextEditor',
], shortcut = "shift+cmd+]" }
'e]g' = { name = "Editor: Next in Group", 'emit:command' = [
  'workbench.action.nextEditorInGroup',
], shortcut = "cmd+k alt+cmd+right" }
ef = { name = "Editor: Forward", 'emit:command' = [
  'workbench.action.quickOpenLeastRecentlyUsedEditorInGroup',
], shortcut = "ctrl+shift+tab" }
eb = { name = "Editor: Back", 'emit:command' = [
  'workbench.action.quickOpenPreviousRecentlyUsedEditorInGroup',
], shortcut = "ctrl+tab" }
'?eq' = { name = "Editor: Quit" }
eq = { name = "Editor: Quit", 'emit:command' = [
  'workbench.action.closeActiveEditor',
], shortcut = "cmd+w" }
eqa = { name = "Editor: Quit All", 'emit:command' = [
  'workbench.action.closeAllEditors',
], shortcut = "cmd+k cmd+w" }
eqo = { name = "Editor: Quit Others", 'emit:command' = [
  'workbench.action.closeOtherEditors',
], shortcut = "alt+cmd+t" }
equ = { name = "Split: Quit Unmodified", 'emit:command' = [
  'workbench.action.closeUnmodifiedEditors',
], shortcut = "cmd+k u" }

'?eg' = { name = "Editor Group" }
egd = { name = "workbench.action.moveActiveEditorGroupDown", 'emit:command' = [
  'workbench.action.moveActiveEditorGroupDown',
], shortcut = "cmd+k down" }
egl = { name = "workbench.action.moveActiveEditorGroupLeft", 'emit:command' = [
  'workbench.action.moveActiveEditorGroupLeft',
], shortcut = "cmd+k left" }
egr = { name = "workbench.action.moveActiveEditorGroupRight", 'emit:command' = [
  'workbench.action.moveActiveEditorGroupRight',
], shortcut = "cmd+k right" }
egu = { name = "workbench.action.moveActiveEditorGroupUp", 'emit:command' = [
  'workbench.action.moveActiveEditorGroupUp',
], shortcut = "cmd+k up" }


'?t' = { name = "Tab / Terminal" }
t1 = { name = "Tab 1", 'emit:command' = [
  'workbench.action.openEditorAtIndex1',
], shortcut = "ctrl+1" }
t2 = { name = "Tab 2", 'emit:command' = [
  'workbench.action.openEditorAtIndex2',
], shortcut = "ctrl+2" }
t3 = { name = "Tab 3", 'emit:command' = [
  'workbench.action.openEditorAtIndex3',
], shortcut = "ctrl+3" }
t4 = { name = "Tab 4", 'emit:command' = [
  'workbench.action.openEditorAtIndex4',
], shortcut = "ctrl+4" }
t5 = { name = "Tab 5", 'emit:command' = [
  'workbench.action.openEditorAtIndex5',
], shortcut = "ctrl+5" }
t6 = { name = "Tab 6", 'emit:command' = [
  'workbench.action.openEditorAtIndex6',
], shortcut = "ctrl+6" }
t7 = { name = "Tab 7", 'emit:command' = [
