tn = { name = "workbench.action.terminal.new", 'emit:command' = [
  'workbench.action.terminal.new", shortcut = "ctrl+shift+`',
] }
tt = { name = "Terminal: Toggle", 'emit:command' = [
  'workbench.action.terminal.toggleTerminal`", shortcut = "ctrl+',
] }
tl = { name = "Terminal: Link Open", 'emit:command' = [
